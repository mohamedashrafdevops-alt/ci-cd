<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telemedicine Portal</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 50px; background-color: #f4f7f6; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        .status { margin-top: 20px; font-weight: bold; color: #2c3e50; }
        .healthy { color: #27ae60; }
        .error { color: #c0392b; }
    </style>
</head>
<body>
    <div class="card">
        <h2>⚕️ Telemedicine Portal</h2>
        <p>Checking system health...</p>
        <div id="api-status" class="status">Loading...</div>
    </div>

    <script>
        
        fetch('/api/health')
            .then(response => response.json())
            .then(data => {
                const statusDiv = document.getElementById('api-status');
                statusDiv.innerHTML = `API Status: ${data.status} <br> Time: ${new Date(data.timestamp).toLocaleTimeString()}`;
                statusDiv.className = 'status healthy';
            })
            .catch(error => {
                const statusDiv = document.getElementById('api-status');
                statusDiv.innerText = 'System Offline';
                statusDiv.className = 'status error';
            });
    </script>
</body>
</html>
